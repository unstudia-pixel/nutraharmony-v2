<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutraHarmony — Special Offer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:      #FAF8F3;
      --cream-warm: #F0E9DA;
      --cream-mid:  #E4D8C2;
      --gold:       #C4A83B;
      --gold-light: #E8D47A;
      --gold-pale:  #FBF6E8;
      --green:      #007F4E;
      --green-mid:  #2A9D6F;
      --green-pale: #C8EAD9;
      --black:      #1A1A1A;
      --gray:       #6B6B6B;
      --white:      #FFFFFF;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }

    /* ── Page wrapper ── */
    .wrap {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── Timer headline ── */
    .timer-line {
      font-size: 17px;
      font-weight: 700;
      color: var(--black);
      text-align: center;
      margin-bottom: 24px;
      letter-spacing: -0.01em;
    }
    .timer-line .t {
      color: var(--green);
      font-variant-numeric: tabular-nums;
    }

    /* ── Main card ── */
    .card {
      width: 100%;
      border-radius: 28px;
      background: linear-gradient(140deg,
        #FBF9F4 0%,
        #EEE6D2 30%,
        #C9E8D8 65%,
        #8ECFB0 100%
      );
      display: flex;
      align-items: stretch;
      overflow: hidden;
      min-height: 400px;
      position: relative;
      box-shadow: 0 16px 60px rgba(0,0,0,0.10);
    }

    /* ── Card left ── */
    .card-left {
      flex: 1;
      padding: 52px 44px 52px 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0;
      z-index: 2;
    }

    .headline-1 {
      font-family: 'Playfair Display', serif;
      font-size: 38px;
      font-weight: 800;
      color: var(--black);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }
    .headline-2 {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 700;
      font-style: italic;
      color: var(--gold);
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    .card-desc {
      font-size: 13px;
      color: var(--black);
      line-height: 1.55;
      max-width: 240px;
      margin-bottom: 24px;
      opacity: 0.82;
    }
    .card-desc strong { font-weight: 700; }

    /* ── Mini CTA row inside card ── */
    .mini-cta-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .mini-btn {
      background: var(--white);
      border: 1.5px solid rgba(0,0,0,0.18);
      color: var(--black);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
    }
    .mini-badge {
      background: var(--gold);
      color: var(--white);
      font-size: 11px;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    /* ── Card right ── */
    .card-right {
      flex: 0 0 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 32px 20px;
    }

    /* glowing circle */
    .product-circle {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%,
        rgba(255,255,255,0.92) 0%,
        rgba(200,234,217,0.65) 60%,
        rgba(142,207,176,0.3) 100%
      );
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .product-circle img {
      width: 160px;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 12px 28px rgba(0,0,0,0.20));
      position: relative;
      z-index: 2;
    }

    /* sparkles */
    .spark {
      position: absolute;
      color: var(--gold);
      font-size: 0;
      z-index: 1;
    }
    .spark svg { display: block; }

    .spark-1 { top: 14px;  left: 26px;  }
    .spark-2 { top: 22px;  right: 40px; }
    .spark-3 { bottom: 22px; left: 18px;  }
    .spark-4 { bottom: 30px; right: 28px; }
    .spark-5 { top: 50%;  left: -10px; transform: translateY(-50%); }

    /* ── Social proof ── */
    .social-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 22px;
      margin-bottom: 18px;
      font-size: 16px;
      color: var(--black);
      flex-wrap: wrap;
    }
    .social-row strong { font-weight: 800; }
    .stars { display: flex; gap: 2px; }
    .stars svg { color: var(--gold); }
    .review-count { font-weight: 700; font-size: 16px; color: var(--black); }

    /* ── Main CTA button ── */
    .main-cta {
      width: 100%;
      background: var(--green);
      color: var(--white);
      font-size: 20px;
      font-weight: 500;
      border: none;
      border-radius: 10px;
      padding: 20px 32px;
      cursor: pointer;
      letter-spacing: 0.01em;
      box-shadow: 0 4px 18px rgba(0,127,78,0.38);
      transition: transform 0.16s, box-shadow 0.16s;
      position: relative;
      overflow: hidden;
    }
    .main-cta::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 55%);
      pointer-events: none;
    }
    .main-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 26px rgba(0,127,78,0.44); }
    .main-cta strong { font-weight: 800; }

    /* ── Guarantee row ── */
    .guarantee {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 14px;
      font-size: 15px;
      font-style: italic;
      color: var(--gray);
    }
    .guarantee svg { flex-shrink: 0; color: var(--gray); }

    /* ── Sparkle SVG ── */
    @keyframes twinkle {
      0%, 100% { opacity: 1; transform: scale(1) rotate(0deg); }
      50%       { opacity: 0.5; transform: scale(0.75) rotate(20deg); }
    }
    .spark svg { animation: twinkle 2.4s ease-in-out infinite; }
    .spark-2 svg { animation-delay: 0.6s; }
    .spark-3 svg { animation-delay: 1.2s; }
    .spark-4 svg { animation-delay: 1.8s; }
    .spark-5 svg { animation-delay: 0.9s; }
  </style>
</head>
<body>

<div class="wrap">

  <!-- Timer headline -->
  <p class="timer-line">
    Before you go! You qualify for a special offer for the next <span class="t" id="timerDisplay">09:59</span>…
  </p>

  <!-- Main card -->
  <div class="card">

    <!-- Left: text -->
    <div class="card-left">
      <div class="headline-1">Stay consistent</div>
      <div class="headline-2">and feel your best!</div>
      <p class="card-desc">For the best results, your body needs <strong>a full 90-day</strong> hormonal balance protocol.</p>
      <div class="mini-cta-row">
        <button class="mini-btn">CONTINUE YOUR PROTOCOL</button>
        <span class="mini-badge">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          30% OFF
        </span>
      </div>
    </div>

    <!-- Right: product in circle -->
    <div class="card-right">
      <div class="product-circle">
        <!-- sparkles -->
        <span class="spark spark-1">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.8 7.2 7.2 1.8-7.2 1.8-1.8 7.2-1.8-7.2-7.2-1.8 7.2-1.8z"/></svg>
        </span>
        <span class="spark spark-2">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.8 7.2 7.2 1.8-7.2 1.8-1.8 7.2-1.8-7.2-7.2-1.8 7.2-1.8z"/></svg>
        </span>
        <span class="spark spark-3">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.8 7.2 7.2 1.8-7.2 1.8-1.8 7.2-1.8-7.2-7.2-1.8 7.2-1.8z"/></svg>
        </span>
        <span class="spark spark-4">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.8 7.2 7.2 1.8-7.2 1.8-1.8 7.2-1.8-7.2-7.2-1.8 7.2-1.8z"/></svg>
        </span>
        <span class="spark spark-5">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.8 7.2 7.2 1.8-7.2 1.8-1.8 7.2-1.8-7.2-7.2-1.8 7.2-1.8z"/></svg>
        </span>

        <img
          src="https://cdn.shopify.com/s/files/1/0759/6228/6390/files/71XTtIVq3nL._SL1500__21.png?v=1778769068"
          alt="NutraHarmony 15-in-1 Menopause"
        />
      </div>
    </div>

  </div><!-- /card -->

  <!-- Social proof -->
  <div class="social-row">
    <span><strong>1,204+</strong> customers accepted this offer</span>
    <div class="stars">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    </div>
    <span class="review-count">4.9 | 2,847 Reviews</span>
  </div>

  <!-- Big CTA -->
  <button class="main-cta">
    Continue My Protocol &amp; <strong>Save 30%</strong>
  </button>

  <!-- Guarantee -->
  <div class="guarantee">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    60-day satisfaction guarantee
  </div>

</div>

<script>
(function () {
  const KEY = 'nhUpsellExpiry';
  let exp = parseInt(sessionStorage.getItem(KEY) || '0');
  if (!exp || exp <= Date.now()) {
    exp = Date.now() + 10 * 60 * 1000;
    sessionStorage.setItem(KEY, exp);
  }
  const el = document.getElementById('timerDisplay');
  function tick() {
    const left = Math.max(0, exp - Date.now());
    const m = Math.floor(left / 60000);
    const s = Math.floor((left % 60000) / 1000);
    el.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    if (left > 0) requestAnimationFrame(tick);
  }
  tick();
})();
</script>
</body>
</html>
